name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish assets for (e.g. v1.0.0)"
        required: false
        type: string
      force_publish_existing:
        description: "Run publish steps even if semantic-release does not publish a new release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.publish_context.outputs.should_publish }}
      new_release_version: ${{ steps.publish_context.outputs.release_version }}
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-release-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-release-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run bundle

      - name: Test
        run: bun run test

      - name: Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            semantic-release-vsce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          NPM_CONFIG_PACKAGE_LOCK: "false"

      - name: Resolve publish context
        id: publish_context
        shell: bash
        run: |
          SEMANTIC_PUBLISHED="${{ steps.semantic.outputs.new_release_published }}"
          SEMANTIC_VERSION="${{ steps.semantic.outputs.new_release_version }}"
          FORCE_EXISTING="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_publish_existing == 'true' }}"
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || '' }}"

          SHOULD_PUBLISH="false"
          RELEASE_VERSION=""
          MANUAL_PUBLISH="false"

          if [ "$SEMANTIC_PUBLISHED" = "true" ] && [ -n "$SEMANTIC_VERSION" ]; then
            SHOULD_PUBLISH="true"
            RELEASE_VERSION="$SEMANTIC_VERSION"
          elif [ "$FORCE_EXISTING" = "true" ] && [ -n "$RELEASE_TAG" ]; then
            SHOULD_PUBLISH="true"
            RELEASE_VERSION="${RELEASE_TAG#v}"
            MANUAL_PUBLISH="true"
          fi

          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "manual_publish=$MANUAL_PUBLISH" >> "$GITHUB_OUTPUT"

      - name: Package VSIX for manual publish
        if: steps.publish_context.outputs.manual_publish == 'true'
        run: bun run package

      - name: Publish Universal to VS Code Marketplace
        if: steps.publish_context.outputs.should_publish == 'true'
        run: |
          # The vsce plugin packages the VSIX in the root when publish is false
          VSIX_PATH=$(ls *.vsix | head -n 1)
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX found to publish"
            exit 1
          fi

          echo "Verifying VSIX integrity: $VSIX_PATH"
          node scripts/verify-vsix.js "$VSIX_PATH"
          
          for i in {1..3}; do
            echo "Attempt $i: Publishing $VSIX_PATH to VS Code Marketplace..."
            bunx vsce publish --packagePath "$VSIX_PATH" && break || {
              if [ $i -lt 3 ]; then
                echo "Publish failed. Retrying in 30 seconds..."
                sleep 30
              else
                echo "Final attempt failed."
                exit 1
              fi
            }
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.publish_context.outputs.should_publish == 'true'
        run: |
          echo "Looking for VSIX files..."
          ls -R *.vsix dist/*.vsix 2>/dev/null || echo "No .vsix files found in root or dist/"
          
          # Find the packaged VSIX
          VSIX_PATH=$(find . -maxdepth 2 -name "*.vsix" | head -n 1)
          
          if [ -n "$VSIX_PATH" ] && [ -f "$VSIX_PATH" ]; then
            echo "Verifying VSIX integrity: $VSIX_PATH"
            node scripts/verify-vsix.js "$VSIX_PATH"
            echo "Publishing $VSIX_PATH to Open VSX..."
            bunx ovsx publish "$VSIX_PATH" -p ${{ secrets.OVSX_TOKEN }}
          else
            echo "Error: No VSIX file found to publish to Open VSX"
            echo "Current directory contents:"
            ls -F
            exit 1
          fi
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

  publish-targets:
    name: Publish Target Specific VSIXs
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        target: [win32-x64, win32-arm64, linux-x64, linux-arm64, darwin-x64, darwin-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new_release_version }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-release-target-${{ matrix.target }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-release-target-${{ matrix.target }}-
            ${{ runner.os }}-bun-release-target-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Package VSIX
        run: bun run package:target
        env:
          npm_config_target: ${{ matrix.target }}
          SENTRY_UPLOAD: "false" # Source maps already uploaded by the universal release

      - name: Rename VSIX
        run: |
          mkdir -p dist
          mv *.vsix dist/stata-workbench-${{ matrix.target }}.vsix || true

      - name: Verify VSIX
        run: node scripts/verify-vsix.js dist/stata-workbench-${{ matrix.target }}.vsix

      - name: Publish to VS Code Marketplace
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Publishing to VS Code Marketplace..."
            bunx vsce publish --packagePath dist/stata-workbench-${{ matrix.target }}.vsix && break || {
              if [ $i -lt 3 ]; then
                echo "Publish failed. Retrying in 30 seconds..."
                sleep 30
              else
                echo "Final attempt failed."
                exit 1
              fi
            }
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: bunx ovsx publish dist/stata-workbench-${{ matrix.target }}.vsix -p ${{ secrets.OVSX_TOKEN }}
        continue-on-error: true # OVSX can be flaky

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/stata-workbench-${{ matrix.target }}.vsix
          tag_name: v${{ needs.release.outputs.new_release_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

