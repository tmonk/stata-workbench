name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to publish assets for (e.g. v1.0.0)"
        required: false
        type: string
      force_publish_existing:
        description: "Run publish steps even if semantic-release does not publish a new release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.publish_context.outputs.should_publish }}
      new_release_version: ${{ steps.publish_context.outputs.release_version }}
      manual_publish: ${{ steps.publish_context.outputs.manual_publish }}
      release_tag: ${{ steps.publish_context.outputs.release_tag }}
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' && github.event.inputs.release_tag || github.ref }}

      - name: Resolve manual publish request
        id: publish_request
        shell: bash
        run: |
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || '' }}"
          FORCE_EXISTING="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_publish_existing == 'true' }}"

          MANUAL_REQUESTED="false"
          if [ "$FORCE_EXISTING" = "true" ] && [ -n "$RELEASE_TAG" ]; then
            MANUAL_REQUESTED="true"
          fi

          echo "manual_requested=$MANUAL_REQUESTED" >> "$GITHUB_OUTPUT"
          echo "requested_release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        if: steps.publish_request.outputs.manual_requested != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-release-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-release-

      - name: Install dependencies
        if: steps.publish_request.outputs.manual_requested != 'true'
        run: bun install --frozen-lockfile

      - name: Build
        if: steps.publish_request.outputs.manual_requested != 'true'
        run: bun run bundle

      - name: Test
        if: steps.publish_request.outputs.manual_requested != 'true'
        run: bun run test

      - name: Release
        id: semantic
        if: steps.publish_request.outputs.manual_requested != 'true'
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            @semantic-release/exec
            semantic-release-vsce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          NPM_CONFIG_PACKAGE_LOCK: "false"

      - name: Resolve publish context
        id: publish_context
        shell: bash
        run: |
          MANUAL_REQUESTED="${{ steps.publish_request.outputs.manual_requested }}"
          REQUESTED_RELEASE_TAG="${{ steps.publish_request.outputs.requested_release_tag }}"
          SEMANTIC_PUBLISHED="${{ steps.semantic.outputs.new_release_published }}"
          SEMANTIC_VERSION="${{ steps.semantic.outputs.new_release_version }}"

          SHOULD_PUBLISH="false"
          RELEASE_VERSION=""
          MANUAL_PUBLISH="false"
          RELEASE_TAG=""

          if [ "$MANUAL_REQUESTED" = "true" ] && [ -n "$REQUESTED_RELEASE_TAG" ]; then
            SHOULD_PUBLISH="true"
            RELEASE_VERSION="${REQUESTED_RELEASE_TAG#v}"
            MANUAL_PUBLISH="true"
            RELEASE_TAG="$REQUESTED_RELEASE_TAG"
          elif [ "$SEMANTIC_PUBLISHED" = "true" ] && [ -n "$SEMANTIC_VERSION" ]; then
            SHOULD_PUBLISH="true"
            RELEASE_VERSION="$SEMANTIC_VERSION"
            RELEASE_TAG="v$SEMANTIC_VERSION"
          fi

          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "manual_publish=$MANUAL_PUBLISH" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Download existing release VSIX assets
        if: steps.publish_context.outputs.manual_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ steps.publish_context.outputs.release_tag }}" \
            --pattern "*.vsix" \
            --dir release-assets \
            --repo "${{ github.repository }}"
          ls -l release-assets

      - name: Resolve universal VSIX path
        id: universal_vsix
        if: steps.publish_context.outputs.should_publish == 'true'
        shell: bash
        run: |
          RELEASE_VERSION="${{ steps.publish_context.outputs.release_version }}"
          if [ "${{ steps.publish_context.outputs.manual_publish }}" = "true" ]; then
            SEARCH_DIR="release-assets"
            VSIX_PATH=$(find "$SEARCH_DIR" -maxdepth 2 -type f -name "*-${RELEASE_VERSION}.vsix" \
              | grep -Ev '(win32|linux|darwin)-(x64|arm64)' \
              | head -n 1 || true)
          else
            SEARCH_DIR="."
            VSIX_PATH=$(find "$SEARCH_DIR" -maxdepth 2 -type f -name "*.vsix" \
              | grep -Ev '(win32|linux|darwin)-(x64|arm64)' \
              | head -n 1 || true)
          fi

          if [ -z "$VSIX_PATH" ]; then
            echo "No universal VSIX found in $SEARCH_DIR for version $RELEASE_VERSION"
            find "$SEARCH_DIR" -maxdepth 2 -type f -name "*.vsix" -print || true
            exit 1
          fi

          echo "vsix_path=$VSIX_PATH" >> "$GITHUB_OUTPUT"

      - name: Publish Universal to VS Code Marketplace
        if: steps.publish_context.outputs.should_publish == 'true'
        run: |
          VSIX_PATH="${{ steps.universal_vsix.outputs.vsix_path }}"
          if [ -z "$VSIX_PATH" ]; then
            echo "No VSIX found to publish"
            exit 1
          fi

          echo "Verifying VSIX integrity: $VSIX_PATH"
          node scripts/verify-vsix.js "$VSIX_PATH"
          
          for i in {1..3}; do
            echo "Attempt $i: Publishing $VSIX_PATH to VS Code Marketplace..."
            OUTPUT=$(bunx vsce publish --packagePath "$VSIX_PATH" 2>&1) && {
              echo "$OUTPUT"
              break
            } || {
              echo "$OUTPUT"
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "Package already exists in Marketplace. Continuing."
                break
              fi
              if [ $i -lt 3 ]; then
                echo "Publish failed. Retrying in 30 seconds..."
                sleep 30
              else
                echo "Final attempt failed."
                exit 1
              fi
            }
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        if: steps.publish_context.outputs.should_publish == 'true'
        run: |
          VSIX_PATH="${{ steps.universal_vsix.outputs.vsix_path }}"
          if [ -n "$VSIX_PATH" ] && [ -f "$VSIX_PATH" ]; then
            echo "Verifying VSIX integrity: $VSIX_PATH"
            node scripts/verify-vsix.js "$VSIX_PATH"
            echo "Publishing $VSIX_PATH to Open VSX..."
            set +e
            OUTPUT=$(bunx ovsx publish "$VSIX_PATH" -p ${{ secrets.OVSX_TOKEN }} 2>&1)
            STATUS=$?
            set -e
            echo "$OUTPUT"
            if [ "$STATUS" -ne 0 ] && ! echo "$OUTPUT" | grep -qi "already exists"; then
              exit "$STATUS"
            fi
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "Package already exists in Open VSX. Continuing."
            fi
          else
            echo "Error: No VSIX file found to publish to Open VSX"
            echo "Current directory contents:"
            ls -F
            exit 1
          fi
        env:
          OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}

  publish-targets:
    name: Publish Target Specific VSIXs
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        target: [win32-x64, win32-arm64, linux-x64, linux-arm64, darwin-x64, darwin-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.release_tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        if: needs.release.outputs.manual_publish != 'true'
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-release-target-${{ matrix.target }}-${{ hashFiles('bun.lock', 'package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-release-target-${{ matrix.target }}-
            ${{ runner.os }}-bun-release-target-

      - name: Install dependencies
        if: needs.release.outputs.manual_publish != 'true'
        run: bun install --frozen-lockfile

      - name: Package VSIX
        if: needs.release.outputs.manual_publish != 'true'
        run: bun run package:target
        env:
          npm_config_target: ${{ matrix.target }}
          SENTRY_UPLOAD: "false" # Source maps already uploaded by the universal release

      - name: Download target VSIX from existing release
        if: needs.release.outputs.manual_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist
          RELEASE_VERSION="${{ needs.release.outputs.new_release_version }}"
          gh release download "${{ needs.release.outputs.release_tag }}" \
            --pattern "*${{ matrix.target }}-${RELEASE_VERSION}.vsix" \
            --dir dist \
            --repo "${{ github.repository }}"

          TARGET_VSIX=$(find dist -maxdepth 1 -type f -name "*${{ matrix.target }}-${RELEASE_VERSION}.vsix" | head -n 1)
          if [ -z "$TARGET_VSIX" ]; then
            echo "No VSIX found for target ${{ matrix.target }} and version ${RELEASE_VERSION}"
            ls -l dist || true
            exit 1
          fi

          mv "$TARGET_VSIX" "dist/stata-workbench-${{ matrix.target }}.vsix"

      - name: Rename VSIX
        if: needs.release.outputs.manual_publish != 'true'
        run: |
          mkdir -p dist
          mv *.vsix dist/stata-workbench-${{ matrix.target }}.vsix || true

      - name: Verify VSIX
        run: node scripts/verify-vsix.js dist/stata-workbench-${{ matrix.target }}.vsix

      - name: Publish to VS Code Marketplace
        run: |
          for i in {1..3}; do
            echo "Attempt $i: Publishing to VS Code Marketplace..."
            OUTPUT=$(bunx vsce publish --packagePath dist/stata-workbench-${{ matrix.target }}.vsix 2>&1) && {
              echo "$OUTPUT"
              break
            } || {
              echo "$OUTPUT"
              if echo "$OUTPUT" | grep -qi "already exists"; then
                echo "Package already exists in Marketplace. Continuing."
                break
              fi
              if [ $i -lt 3 ]; then
                echo "Publish failed. Retrying in 30 seconds..."
                sleep 30
              else
                echo "Final attempt failed."
                exit 1
              fi
            }
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: |
          set +e
          OUTPUT=$(bunx ovsx publish dist/stata-workbench-${{ matrix.target }}.vsix -p ${{ secrets.OVSX_TOKEN }} 2>&1)
          STATUS=$?
          set -e
          echo "$OUTPUT"
          if [ "$STATUS" -ne 0 ] && ! echo "$OUTPUT" | grep -qi "already exists"; then
            exit "$STATUS"
          fi
          if echo "$OUTPUT" | grep -qi "already exists"; then
            echo "Package already exists in Open VSX. Continuing."
          fi
        continue-on-error: true # OVSX can be flaky

      - name: Upload to GitHub Release
        if: needs.release.outputs.manual_publish != 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/stata-workbench-${{ matrix.target }}.vsix
          tag_name: v${{ needs.release.outputs.new_release_version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

